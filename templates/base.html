<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaperIntel AI - Research Paper Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            width: 100%;
            background: linear-gradient(135deg, #0a0e27 0%, #11152d 50%, #1a1a3e 100%) !important;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #11152d 50%, #1a1a3e 100%) !important;
            color: #e2e8f0;
            overflow: hidden;
        }
        
        /* Premium UI Components */
        .glass-effect {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 212, 255, 0.15);
        }
        
        .glass-effect-strong {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }
        
        .gradient-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .glow-effect {
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        
        /* Buttons */
        .btn {
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
            color: #0a0e27;
            padding: 10px 20px;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.4);
        }
        
        .btn-primary:active {
            transform: translateY(0px);
        }
        
        .btn-secondary {
            background: rgba(100, 100, 200, 0.15);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: #00d4ff;
            padding: 8px 16px;
        }
        
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
        }
        
        /* Inputs */
        input, textarea, select {
            background: rgba(30, 35, 70, 0.4);
            border: 1px solid rgba(0, 212, 255, 0.15);
            color: #e2e8f0;
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }
        
        input::placeholder, textarea::placeholder {
            color: #64748b;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.5);
            background: rgba(30, 35, 70, 0.6);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.1);
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30, 35, 70, 0.2);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #00d4ff, #0077aa);
        }
        
        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease;
        }
        
        .slide-in-right {
            animation: slideInRight 0.4s ease;
        }
        
        /* Typography */
        h1 { font-size: 2.5rem; font-weight: 800; }
        h2 { font-size: 1.875rem; font-weight: 700; }
        h3 { font-size: 1.5rem; font-weight: 700; }
        h4 { font-size: 1.25rem; font-weight: 600; }
        p { font-size: 0.95rem; line-height: 1.6; }
        
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        
        /* Spacing helpers */
        .gap-xs { gap: 0.5rem; }
        .gap-sm { gap: 1rem; }
        .gap-md { gap: 1.5rem; }
        .gap-lg { gap: 2rem; }
        
        /* Cards */
        .card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            background: rgba(15, 23, 42, 0.7);
        }
        
        /* Badges */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .badge-primary {
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        
        .badge-success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
    </style>
</head>
<body style="background: linear-gradient(135deg, #0a0e27 0%, #11152d 50%, #1a1a3e 100%) !important; height: 100vh; width: 100vw; overflow: hidden;" class="flex flex-col">
    {% block content %}{% endblock %}
</body>
</html>
