apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: paperintel-app
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/your-username/research-paper-summarizer  # Update
    targetRevision: main
    path: k8s
    
    plugin:
      name: kustomize
    
    # Parameters that ArgoCD will update from Jenkins
    helm:
      parameters:
      - name: image.tag
        value: latest
      - name: image.repository
        value: your-dockerhub-username/paperintel
  
  destination:
    server: https://kubernetes.default.svc
    namespace: paperintel
  
  syncPolicy:
    automated:
      prune: true           # Delete resources not in git
      selfHeal: true        # Auto-sync on cluster changes
      allowEmpty: false     # Prevent accidental deletion
    
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=background
    - RespectIgnoreDifferences=true
    
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
  
  # Ignore differences in fields that constantly change
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
data:
  # Enable server insecure mode for testing
  server.insecure: "false"
  
  # Git URL pattern for GitHub
  url: https://argocd.example.com  # Update with your ArgoCD URL
  
  # Application instance label key
  application.instanceLabelKey: argocd.argoproj.io/instance
  
  # Webhook config
  webhook.github.secret: github-webhook-secret
  
  # Repository credentials
  repositories: |
    - type: git
      url: https://github.com/your-username/research-paper-summarizer
      username: github-username
      password: github-token
---
apiVersion: v1
kind: Secret
metadata:
  name: github-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  type: git
  url: https://github.com/your-username/research-paper-summarizer
  username: your-github-username
  password: your-github-token
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-image-updater
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argocd-image-updater
rules:
- apiGroups:
  - argoproj.io
  resources:
  - applications
  verbs:
  - get
  - list
  - patch
  - update
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argocd-image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argocd-image-updater
subjects:
- kind: ServiceAccount
  name: argocd-image-updater
  namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-image-sync
  namespace: argocd
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-image-updater
          containers:
          - name: image-updater
            image: argoproj/argocd-image-updater:v0.12.1
            command:
            - argocd-image-updater
            - run
            env:
            - name: ARGOCD_SERVER
              value: argocd-server.argocd.svc.cluster.local
            - name: ARGOCD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: argocd-image-updater-token
                  key: token
            - name: ARGOCD_INSECURE
              value: "false"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 200m
                memory: 512Mi
          restartPolicy: OnFailure
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-image-updater-token
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  token: "argocd-token-from-jenkins-or-manual"
---
apiVersion: notification.argoproj.io/v1alpha1
kind: NotificationTemplate
metadata:
  name: app-deployed-successfully
  namespace: argocd
template: |
  message: |
    ArgoCD has successfully deployed {{.app.metadata.name}}
    Application Details: {{.app.status.operationState.finishedAt}}
  slack:
    attachments: |
      [{
        "color": "#18be52",
        "title": "{{ .app.metadata.name}}",
        "title_link": "{{ .context.argocdUrl }}/applications/{{ .app.metadata.name }}",
        "fields": [
        {
          "title": "Sync Status",
          "value": "{{ .app.status.syncResult.status }}",
          "short": true
        },
        {
          "title": "Repository",
          "value": "{{ .app.spec.source.repoURL }}",
          "short": true
        }
        ],
        "image_url": "https://platform.slack-edge.com/img/default_application_icon.png"
      }]
  discord:
    embeds: |
      [{
        "color": 15258703,
        "title": "{{ .app.metadata.name}} deployment successful",
        "url": "{{ .context.argocdUrl }}/applications/{{ .app.metadata.name }}",
        "description": "Application {{.app.metadata.name}} is now synced with status {{.app.status.syncResult.status}}"
      }]
