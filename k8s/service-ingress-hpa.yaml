apiVersion: v1
kind: Service
metadata:
  name: paperintel
  namespace: paperintel
  labels:
    app: paperintel
spec:
  type: ClusterIP
  selector:
    app: paperintel
  ports:
  - name: http
    port: 80
    targetPort: 8001    # Matches containerPort in deployment.yaml
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
---
# NodePort for local minikube access (use this to test without ingress)
apiVersion: v1
kind: Service
metadata:
  name: paperintel-nodeport
  namespace: paperintel
  labels:
    app: paperintel
spec:
  type: NodePort
  selector:
    app: paperintel
  ports:
  - name: http
    port: 8001
    targetPort: 8001
    nodePort: 30001    # Access via: minikube ip:30001
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: paperintel
  namespace: paperintel
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    # Uncomment below when you have a real domain + cert-manager
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  # Uncomment tls block when you have a real domain
  # tls:
  # - hosts:
  #   - paperintel.example.com
  #   secretName: paperintel-tls
  rules:
  - host: paperintel.local   # For local: add to /etc/hosts -> <minikube ip> paperintel.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: paperintel
            port:
              number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: paperintel-pdb
  namespace: paperintel
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: paperintel
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: paperintel-hpa
  namespace: paperintel
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: paperintel
  minReplicas: 1    # 1 for minikube, set to 3 for production
  maxReplicas: 5    # 5 for minikube, set to 10 for production
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max