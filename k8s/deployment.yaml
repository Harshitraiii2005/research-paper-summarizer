apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperintel
  namespace: paperintel
  labels:
    app: paperintel
    version: v1
spec:
  replicas: 1   # Start with 1 for minikube, increase for production
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: paperintel
  template:
    metadata:
      labels:
        app: paperintel
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: paperintel
      imagePullSecrets:
      - name: dockerhub-secret

      initContainers:
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]

      containers:
      - name: paperintel
        # Jenkins CI builds: harshitrai20/paperintel:<BUILD_NUMBER>
        # ArgoCD updates this tag automatically on each build
        image: harshitrai20/paperintel:latest
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 8001
          protocol: TCP

        envFrom:
        - configMapRef:
            name: paperintel-config
        - secretRef:
            name: paperintel-secrets

        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi

        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30

        volumeMounts:
        - name: cache
          mountPath: /app/cache
        - name: logs
          mountPath: /app/logs

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      volumes:
      - name: cache
        emptyDir:
          sizeLimit: 5Gi
      - name: logs
        emptyDir:
          sizeLimit: 2Gi

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - paperintel
              topologyKey: kubernetes.io/hostname

      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      restartPolicy: Always