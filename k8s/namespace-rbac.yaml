apiVersion: v1
kind: Namespace
metadata:
  name: paperintel
  labels:
    name: paperintel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: paperintel
  namespace: paperintel
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: paperintel
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: paperintel
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: paperintel
subjects:
- kind: ServiceAccount
  name: paperintel
  namespace: paperintel
